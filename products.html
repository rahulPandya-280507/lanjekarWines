<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Products - Lanjekar Wines</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/ico" href="images/favicon.ico">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <!-- AGE VERIFICATION -->
    <div class="age-popup" id="age-popup">
        <div class="age-box">
            <h2>Are You 18+?</h2>
            <p>You must be of legal drinking age to enter this website.</p>

            <div class="age-buttons">
                <button id="age-yes">Yes, I am 18+</button>
                <button id="age-no">No</button>
            </div>
        </div>
    </div>
    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="container">
            <div class="nav-content">
                <div class="logo">
                    <a href="index.html">
                        <img src="images/logo.png" alt="Lanjekar Wines">
                    </a>
                </div>
                <div class="menu-toggle" id="menu-toggle">☰</div>
                <ul class="nav-links" id="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- PRODUCTS SECTION -->
    <section class="products">
        <div class="container">
            <h1 id="category-title"></h1>
            <!-- SEARCH BAR -->
            <div class="search-wrapper">
                <input type="text" id="search-input" placeholder="Search for your favourite drinks!">
            </div>
            <!-- BEER FILTERS (ONLY SHOWS FOR BEER) -->
            <div class="filter-wrapper beer-filters" id="beer-filters">
                <select id="filter-type">
                    <option value="all">All Types</option>
                    <option value="bottle">Bottle</option>
                    <option value="can">Can</option>
                    <option value="pint">Pint</option>
                </select>

                <select id="filter-strength">
                    <option value="all">All Strengths</option>
                    <option value="strong">Strong</option>
                    <option value="mild">Mild</option>
                </select>
            </div>
            <!-- whiskey filters  -->
            <div class="filter-wrapper whiskey-filters" id="whiskey-filters">

                <select id="filter-whiskey-type">
                    <option value="all">All Types</option>
                    <option value="indian whisky">Indian Whisky</option>
                    <option value="japanese blended whisky">Japanese Blended Whisky</option>
                    <option value="scotch whisky">Scotch Whisky</option>
                    <option value="irish whiskey">Irish Whiskey</option>
                    <option value="american whiskey">American Whiskey</option>
                    <option value="bourbon whiskey">Bourbon Whiskey</option>
                    <option value="rye whiskey">Rye Whiskey</option>
                    <option value="canadian whiskey">Canadian Whiskey</option>
                    <option value="flavoured whisky">Flavoured Whisky</option>
                    <option value="mature malt whisky">Mature Malt Whisky</option>
                </select>

                <select id="filter-whiskey-style">
                    <option value="all">All Styles</option>

                    <!-- Core Production Styles -->
                    <option value="single malt">Single Malt</option>
                    <option value="blended whisky">Blended Whisky</option>
                    <option value="blended malt">Blended Malt</option>
                    <option value="grain whisky">Grain Whisky</option>
                    <option value="straight whiskey">Straight Whiskey</option>

                    <!-- Strength & Special Production -->
                    <option value="cask strength">Cask Strength</option>
                    <option value="triple distilled">Triple Distilled</option>

                    <!-- Flavor Profile -->
                    <option value="peated">Peated / Smoky</option>

                    <!-- Cask Finish -->
                    <option value="cask finished">Cask Finished</option>
                </select>

            </div>

            <!-- rum filters -->
             <div class="filter-wrapper rum-filters" id="rum-filters">
                <select id="filter-rum-type">
                    <option value="all">All types</option>
                    <option value="dark">Dark</option>
                    <option value="white">White</option>
                </select>
             </div>
             
            <div class="product-grid" id="product-grid"></div>
        </div>
    </section>


    <!-- PRODUCT MODAL -->
    <div class="modal" id="product-modal">
        <div class="modal-content">

            <span class="close-btn" id="close-modal">&times;</span>

            <!-- LEFT IMAGE -->
            <img id="modal-image" src="" alt="">

            <!-- RIGHT CONTENT -->
            <div class="modal-info">
                <h2 id="modal-name"></h2>
                <p id="modal-price"></p>
                <p id="modal-size"></p>
                <p id="modal-description"></p>
            </div>

        </div>
    </div>
    <!-- FOOTER -->
    <footer class="footer">
        <div class="container footer-content">

            <div class="footer-left">
                <h3>Mapusa Wine Store</h3>
                <p>Premium wines, whiskey, beer & more in Mapusa, Goa.</p>
            </div>

            <div class="footer-middle">
                <h4>Quick Links</h4>
                <a href="index.html">Home</a>
                <a href="contact.html">Contact</a>
            </div>

            <div class="footer-right">
                <h4>Contact</h4>
                <p>📍 Mapusa, Goa</p>
                <p>📞 +91 9876543210</p>
            </div>

        </div>

        <div class="footer-bottom">
            © 2026 Mapusa Wine Store. All Rights Reserved.
        </div>
    </footer>
    <!-- FLOATING WHATSAPP BUTTON -->
    <a href="https://wa.me/919876543210" class="floating-whatsapp" target="_blank">
        <i class="fab fa-whatsapp"></i>
    </a>

    <button class="scroll-top" id="scroll-top">↑</button>
    <script src="js/script.js"></script>
    <script src="js/products.js"></script>
</body>

</html>
